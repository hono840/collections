name: Threat Intel Refresh

# 日次でサプライチェーン脅威インテリジェンス(IOCフィード)を再生成し、
# 差分があれば .claude/security/threat-intel.json をコミットする。
# ローカルの PreToolUse hook と CI の両方が、常に同じ最新データを参照できるようにするための仕組み。
#
# スクリプト本体 (.github/scripts/build-threat-intel.mjs) は別途用意される。
# 契約: `node .github/scripts/build-threat-intel.mjs` を実行すると、
#       差分があれば .claude/security/threat-intel.json が更新される。

on:
  schedule:
    # JST 03:00 (UTC 18:00)。health-check (UTC 01:00) と被らない時刻に分散。
    - cron: '0 18 * * *'
  workflow_dispatch: # 手動実行も可能

permissions:
  contents: write # threat-intel.json の自動コミットに必要

# 同時実行を抑制（手動実行と日次実行が重なってもpush競合しないように）
concurrency:
  group: threat-intel-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Build threat intelligence feed
        # GITHUB_TOKEN を渡さないと GitHub Advisory API が未認証(60req/h)になり
        # レート制限(403)で毎回 fail-soft してしまう。認証付き(5000req/h)にする。
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node .github/scripts/build-threat-intel.mjs

      - name: Commit & push if changed
        run: |
          # 差分が無ければ何もしない（git diff --quiet は差分ありで非ゼロ終了）
          if git diff --quiet -- .claude/security/threat-intel.json; then
            echo "脅威インテリジェンスに差分なし。コミットをスキップします。"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .claude/security/threat-intel.json
          git commit -m "chore(security): refresh threat intel feed ($(date -u +%Y-%m-%d))"
          git push
